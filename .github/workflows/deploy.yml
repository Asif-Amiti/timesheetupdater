name: Deploy to Azure App Service

on:
  push:
    branches: [main]

env:
  AZURE_WEBAPP_NAME: ihc-time-app   # Change to your App Service name
  NODE_VERSION: '24.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install client dependencies
        run: cd client && npm install

      - name: Install server dependencies
        run: cd server && npm install

      - name: Build client
        run: cd client && npm run build
        env:
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          VITE_REDIRECT_URI: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

      - name: Build server
        run: cd server && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp -r server/dist deploy-package/
          cp -r server/node_modules deploy-package/
          cp server/package.json deploy-package/
          cp -r client/dist deploy-package/client-dist
          # Create startup script
          echo '{"scripts":{"start":"node dist/index.js"},"dependencies":{}}' > deploy-package/package.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-package
